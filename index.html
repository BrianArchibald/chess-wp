<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Puzzle Trainer</title>

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #282727;
            color: #e0e0e0;
            margin-top: 40px;
        }

        #puzzle-title {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* --- THE TOP BAR --- */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .stats-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* --- CUSTOM DROPDOWN (Now a Drop-up!) --- */
        .custom-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background-color: #2c2c2c;
            color: #e0e0e0;
            padding: 6px 12px;
            font-size: 1rem;
            border: 1px solid #555;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s;
        }

        .dropbtn:hover {
            background-color: #3c3c3c;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            bottom: 100%; /* Pushes the menu UP instead of down */
            right: 0;
            background-color: #1e1e1e;
            min-width: 170px;
            box-shadow: 0px -8px 16px 0px rgba(0,0,0,0.5); /* Shadow flipped upwards */
            border: 1px solid #444;
            border-radius: 6px;
            z-index: 10;
            overflow: hidden;
            margin-bottom: 8px; /* Spacing between button and menu */
        }

        .dropdown-label {
            padding: 8px 12px;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #121212;
            cursor: default;
        }

        .dropdown-content a {
            color: #e0e0e0;
            padding: 10px 12px;
            text-decoration: none;
            display: block;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #4206f8;
        }

        .dropdown-divider {
            height: 1px;
            background-color: #444;
        }

        .reset-action {
            color: #ff5252 !important;
        }

        .reset-action:hover {
            background-color: #ff5252 !important;
            color: #fff !important;
        }

        .show {
            display: block;
        }

        /* --- THE CHESSBOARD --- */
        #board {
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            transition: filter 0.3s ease;
        }

        .blurred {
            filter: blur(10px);
            pointer-events: none;
        }

        .highlight-hint {
            box-shadow: inset 0 0 0 4px rgba(255, 255, 0, 0.9) !important;
        }

        /* --- THE BOTTOM BAR --- */
        #bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            height: 45px;
        }

        #status {
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* --- BUTTON STYLING --- */
        button {
            background-color: #4016bf;
            color: #ffffff;
            border: 1px solid #2a03a3;
            border-radius: 6px;
            transition: background-color 0.2s;
            cursor: pointer;
            font-size: 1.1rem;
        }

        button:hover {
            background-color: #3405c9;
        }

        #pause-btn {
            padding: 6px 12px;
            font-size: 1rem;
        }

        #next-btn {
            padding: 10px 25px;
            font-weight: bold;
        }

        .icon-btn {
            padding: 6px 12px;
            font-size: 1.3rem;
            background-color: transparent;
            border: 1px solid #4206f8;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background-color: rgba(66, 6, 248, 0.2);
        }
    </style>
</head>
<body>

    <h1 id="puzzle-title">Loading...</h1>

    <div id="top-bar">
        <div class="stats-group">
            <div><span id="time-display">00:00</span></div>
            <div>🎯 <span id="accuracy-display">100%</span></div>
        </div>
        <button id="pause-btn" onclick="togglePause()">Pause</button>
    </div>

    <div id="board"></div>

    <div id="bottom-bar">
        <div id="status"></div>

        <div id="action-buttons" style="display:flex; gap:10px; align-items: center;">

            <div class="custom-dropdown">
                <button class="dropbtn" onclick="toggleMenu(event)">
                    <span id="current-mode-text">Easy</span> ⚙️
                </button>
                <div class="dropdown-content" id="menu-content">
                    <div class="dropdown-label">Select Set</div>
                    <a href="#" onclick="setMode('easy', event)">Easy</a>
                    <a href="#" onclick="setMode('intermediate', event)">Intermediate</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="reset-action" onclick="triggerReset(event)">🔄 Reset Progress</a>
                </div>
            </div>

            <button id="hint-btn" class="icon-btn" onclick="showHint()" title="Get a hint">💡</button>
            <button id="next-btn" style="display: none;" onclick="nextPuzzle()">Next</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
